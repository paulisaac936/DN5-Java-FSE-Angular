<form
[formGroup]="enrollForm"
(ngSubmit)="onSubmit()">

<label>Student Name</label>

<input
type="text"
formControlName="studentName">

<br><br>

<label>Student Email</label>

<input
type="email"
formControlName="studentEmail">

<div *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">

Email already taken.

</div>

<br>

<label>Course ID</label>

<input
type="text"
formControlName="courseId">

<div *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

Course code starting with XX is not allowed.

</div>

<br>

<label>Semester</label>

<select formControlName="preferredSemester">

<option value="Odd">Odd</option>

<option value="Even">Even</option>

</select>

<br><br>

<label>

<input
type="checkbox"
formControlName="agreeToTerms">

Agree to Terms

</label>

<br><br>

<h3>Additional Courses</h3>

<button
type="button"
(click)="addCourse()">

Add Another Course

</button>

<br><br>

<div
formArrayName="additionalCourses">

<div
*ngFor="let ctrl of additionalCourses.controls; let i=index">

<input
[formControl]="ctrl">

<button
type="button"
(click)="removeCourse(i)">

Remove

</button>

<br><br>

</div>

</div>

<button
type="submit"
[disabled]="enrollForm.invalid">

Submit

</button>

</form>
